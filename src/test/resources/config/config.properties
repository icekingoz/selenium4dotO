# Defaults; any value can be overridden at runtime, e.g. -Dbrowser=firefox -Dheadless=true
browser=chrome
headless=true
ui.base.url=https://www.saucedemo.com/
api.base.url=https://httpbin.org

# Demo credentials (public test site)
sauce.username=standard_user
